---
x-labels-1: &x-labels-1
  - sablier.enable=true
  - sablier.group=opencloud-main

x-labels-2: &x-labels-2
  - sablier.enable=true
  - sablier.group=opencloud-aux

services:
  # main
  opencloud:
    labels: *x-labels-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/.well-known/openid-configuration"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  radicale:
    labels: *x-labels-1
  tika:
    labels: *x-labels-1
  # aux
  collabora:
    labels: *x-labels-2
  collaboration:
    labels: *x-labels-2
